name: Daily Strategy Signal SOXL BOOM + TECL Long term

on:
  schedule:
    # Runs at 22:00 UTC every Monday-Friday.
    # 22:00 UTC is 5:00 PM EST (New York), safely after market close.
    - cron: "42 20 * * *"
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  run-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Uses cache to speed up installation of libraries
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Signal Generator
        # Assumes your script is named 'telegram_signal.py'
        run: python main_signal_telegram.py
